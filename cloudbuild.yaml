# InterviewAce - Cloud Run deployment configuration
# This file is used by gcloud run deploy and Cloud Build
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/interviewace', '-f', 'interviewace/Dockerfile', 'interviewace/']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/interviewace']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'interviewace'
      - '--image'
      - 'gcr.io/$PROJECT_ID/interviewace'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'GOOGLE_GENAI_USE_VERTEXAI=FALSE'

images:
  - 'gcr.io/$PROJECT_ID/interviewace'
